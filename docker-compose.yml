services:
  # ========= PostgreSQL =========
  postgres:
    image: postgres:16-alpine
    container_name: liveroar-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: liveroar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========= Redis =========
  redis:
    image: redis:7-alpine
    container_name: liveroar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========= Streaming Server (MediaMTX) =========
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: liveroar-streaming
    ports:
      - "1935:1935"   # RTMP ingest
      - "8888:8888/tcp"  # HLS
      - "8889:8889/tcp"  # WebRTC
      - "8189:8189/udp"  # WebRTC
      - "9000:9000/tcp"  # HTTP desc
      - "9001:9001/udp"  # RTSP
      - "9002:9002/tcp"  # RTP
      - "9003:9003/udp"  # RTCP
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
      - stream_data:/streams
    restart: unless-stopped

  # ========= Backend (FastAPI) =========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: liveroar-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/liveroar
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ========= Frontend (Next.js) =========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: liveroar-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  stream_data:
